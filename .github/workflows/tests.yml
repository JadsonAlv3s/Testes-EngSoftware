name: Suíte de Testes - LegendaViva API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  API_URL: http://localhost:8000

jobs:
  # ==================== Testes de API ====================
  api-tests:
    name: 🧪 Testes de API (Jest + Supertest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Clonar projeto LegendaViva
        run: git clone https://github.com/engsoft-ia/projeto-final-grupo-9-legendaviva.git legendaviva

      - name: Criar arquivo .env
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/legendaviva" > .env

      - name: Subir LegendaViva com Docker Compose
        run: |
          cd legendaviva
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "✅ API pronta!"
              exit 0
            fi
            echo "Tentativa $i/40..."
            sleep 5
          done
          echo "❌ API não respondeu a tempo"
          docker compose logs backend
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências dos testes de API (pytest + httpx)
        run: pip install -r tests/api_pytest/requirements.txt

      - name: Executar testes de API (pytest + httpx + Pydantic)
        run: python -m pytest tests/api_pytest/ -v --tb=short --junitxml=reports/api-results.xml
        env:
          API_URL: http://localhost:8000

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências dos testes JS
        run: npm ci

      - name: Executar testes de API (Jest + Supertest)
        run: npm run test:api -- --ci
        env:
          API_URL: http://localhost:8000

      - name: Upload relatórios
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports
          path: |
            reports/
            coverage/
          if-no-files-found: ignore

      - name: Logs do backend (em caso de falha)
        if: failure()
        run: cd legendaviva && docker compose logs backend

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down -v

  # ==================== Testes E2E ====================
  e2e-tests:
    name: 🎭 Testes E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Clonar projeto LegendaViva
        run: git clone https://github.com/engsoft-ia/projeto-final-grupo-9-legendaviva.git legendaviva

      - name: Criar arquivo .env
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/legendaviva" > .env

      - name: Subir LegendaViva com Docker Compose
        run: |
          cd legendaviva
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "✅ API pronta!"
              exit 0
            fi
            echo "Tentativa $i/40..."
            sleep 5
          done
          echo "❌ API não respondeu a tempo"
          docker compose logs backend
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências dos testes
        run: npm ci

      - name: Instalar Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Executar testes E2E
        run: npx playwright test

      - name: Upload relatório Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Logs do backend (em caso de falha)
        if: failure()
        run: cd legendaviva && docker compose logs backend

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down -v

  # ==================== Testes de Performance ====================
  performance-tests:
    name: 🚀 Testes de Performance (k6)
    runs-on: ubuntu-latest
    needs: [api-tests]

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Clonar projeto LegendaViva
        run: git clone https://github.com/engsoft-ia/projeto-final-grupo-9-legendaviva.git legendaviva

      - name: Criar arquivo .env
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/legendaviva" > .env

      - name: Subir LegendaViva com Docker Compose
        run: |
          cd legendaviva
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "✅ API pronta!"
              exit 0
            fi
            echo "Tentativa $i/40..."
            sleep 5
          done
          echo "❌ API não respondeu a tempo"
          docker compose logs backend
          exit 1

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Executar teste de carga
        run: k6 run -e BASE_URL=http://localhost:8000 tests/performance/load-test.js

      - name: Upload relatório de performance
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: tests/performance/summary.json
          if-no-files-found: ignore

      - name: Logs do backend (em caso de falha)
        if: failure()
        run: cd legendaviva && docker compose logs backend

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down -v
