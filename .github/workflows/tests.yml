name: Suíte de Testes - LegendaViva API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  API_URL: http://localhost:8000

jobs:
  # ==================== Setup: Subir a API LegendaViva ====================
  api-tests:
    name: 🧪 Testes de API (Jest + Supertest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Checkout do projeto LegendaViva
        uses: actions/checkout@v4
        with:
          repository: engsoft-ia/projeto-final-grupo-9-legendaviva
          path: legendaviva

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências dos testes
        run: npm ci

      - name: Subir backend LegendaViva com Docker
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || true
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "API pronta!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done

      - name: Executar testes de API
        run: API_URL=http://localhost:8000 npm run test:api -- --ci
        env:
          API_URL: http://localhost:8000

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down

  # ==================== Testes E2E ====================
  e2e-tests:
    name: 🎭 Testes E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Checkout do projeto LegendaViva
        uses: actions/checkout@v4
        with:
          repository: engsoft-ia/projeto-final-grupo-9-legendaviva
          path: legendaviva

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências dos testes
        run: npm ci

      - name: Instalar Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Subir backend LegendaViva com Docker
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || true
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "API pronta!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done

      - name: Executar testes E2E
        run: API_URL=http://localhost:8000 npx playwright test
        env:
          API_URL: http://localhost:8000

      - name: Upload relatório Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down

  # ==================== Testes de Performance ====================
  performance-tests:
    name: 🚀 Testes de Performance (k6)
    runs-on: ubuntu-latest
    needs: [api-tests]

    steps:
      - name: Checkout dos testes
        uses: actions/checkout@v4

      - name: Checkout do projeto LegendaViva
        uses: actions/checkout@v4
        with:
          repository: engsoft-ia/projeto-final-grupo-9-legendaviva
          path: legendaviva

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Subir backend LegendaViva com Docker
        run: |
          cd legendaviva
          cp .env.example .env 2>/dev/null || true
          docker compose up -d backend db
          echo "Aguardando API ficar pronta..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health | grep -q healthy; then
              echo "API pronta!"
              break
            fi
            echo "Tentativa $i/30..."
            sleep 3
          done

      - name: Executar teste de carga
        run: k6 run -e BASE_URL=http://localhost:8000 tests/performance/load-test.js

      - name: Upload relatório de performance
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-report
          path: tests/performance/summary.json

      - name: Parar containers
        if: always()
        run: cd legendaviva && docker compose down
